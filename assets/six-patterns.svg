<svg viewBox="0 0 1200 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="canvas4" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="5" seed="14" result="l"/>
      <feColorMatrix in="l" type="matrix" values="0 0 0 0 0.13  0 0 0 0 0.09  0 0 0 0 0.06  0 0 0 0.26 0" result="t"/>
      <feComposite in="t" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="crackle4">
      <feTurbulence type="fractalNoise" baseFrequency="0.68 0.50" numOctaves="4" seed="19" result="c"/>
      <feColorMatrix in="c" type="matrix" values="0 0 0 0 0.07  0 0 0 0 0.04  0 0 0 0 0.02  0 0 0 0.10 0" result="ct"/>
      <feComposite in="ct" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="warp4">
      <feTurbulence type="turbulence" baseFrequency="0.022 0.038" numOctaves="3" seed="10" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="cardWarp">
      <feTurbulence type="turbulence" baseFrequency="0.028 0.04" numOctaves="3" seed="12" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="vig4" cx="50%" cy="48%" r="70%">
      <stop offset="45%" stop-color="#2C1A0A" stop-opacity="0"/>
      <stop offset="88%" stop-color="#1A0D04" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#0D0602" stop-opacity="0.60"/>
    </radialGradient>
    <linearGradient id="ground4" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#E6D4A4"/>
      <stop offset="40%"  stop-color="#D4BE86"/>
      <stop offset="100%" stop-color="#B89256"/>
    </linearGradient>
    <!-- asset card: verdigris / muted sage -->
    <linearGradient id="assetCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D9A8"/><stop offset="100%" stop-color="#D8C890"/>
    </linearGradient>
    <linearGradient id="assetHdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4E6042"/><stop offset="100%" stop-color="#364430"/>
    </linearGradient>
    <!-- debt card: warm ivory + oxide red -->
    <linearGradient id="debtCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E4CEAD"/><stop offset="100%" stop-color="#D4B890"/>
    </linearGradient>
    <linearGradient id="debtHdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7A2418"/><stop offset="100%" stop-color="#501208"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="740" fill="url(#ground4)"/>
  <rect width="1200" height="740" fill="url(#ground4)" filter="url(#canvas4)" opacity="0.88"/>
  <rect width="1200" height="740" filter="url(#crackle4)" fill="transparent"/>
  <rect width="1200" height="740" fill="url(#vig4)"/>
  <rect x="20" y="20" width="1160" height="700" fill="none" stroke="#6B3A1A" stroke-width="2" rx="1" filter="url(#warp4)" opacity="0.75"/>

  <text x="600" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="24" font-weight="bold" fill="#1E1008">Six Ways of Working With the Machine</text>
  <text x="600" y="86" text-anchor="middle" font-family="Palatino,Georgia,serif" font-style="italic" font-size="13.5" fill="#3E2810" opacity="0.82">Three preserve what you came to learn. Three quietly spend it.</text>

  <!-- center divider — worn ink -->
  <line x1="600" y1="115" x2="600" y2="680" stroke="#4A2810" stroke-width="1.8" stroke-dasharray="6,5" opacity="0.40" filter="url(#warp4)"/>

  <!-- column headers — painted bands -->
  <rect x="100" y="105" width="420" height="32" fill="url(#assetHdr)" rx="3" filter="url(#cardWarp)" opacity="0.88"/>
  <rect x="100" y="105" width="420" height="32" filter="url(#crackle4)" fill="transparent"/>
  <text x="310" y="126" text-anchor="middle" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#D8C890">ASSETS — learning preserved</text>

  <rect x="680" y="105" width="420" height="32" fill="url(#debtHdr)" rx="3" filter="url(#cardWarp)" opacity="0.88"/>
  <rect x="680" y="105" width="420" height="32" filter="url(#crackle4)" fill="transparent"/>
  <text x="890" y="126" text-anchor="middle" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#D8C890">DEBTS — learning bypassed</text>

  <!-- ASSET CARDS -->
  <g font-family="Georgia,serif">
    <!-- Asset 1 -->
    <rect x="80" y="155" width="440" height="135" fill="url(#assetCard)" rx="4" stroke="#4E6042" stroke-width="1" filter="url(#cardWarp)" opacity="0.92"/>
    <rect x="80" y="155" width="440" height="135" filter="url(#crackle4)" fill="transparent"/>
    <circle cx="100" cy="178" r="11" fill="url(#assetHdr)" opacity="0.80"/>
    <text x="100" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#D8C890">1</text>
    <text x="118" y="182" font-size="14.5" font-weight="bold" fill="#1E3018">Conceptual Inquiry</text>
    <text x="100" y="207" font-size="12" fill="#2A2010">Ask "how does this work?" before</text>
    <text x="100" y="224" font-size="12" fill="#2A2010">asking "write this for me."</text>
    <text x="100" y="250" font-size="12" fill="#2A2010">AI is used as a teacher, not a hand.</text>
    <text x="100" y="270" font-size="12" fill="#2A2010">Understanding is built before code exists.</text>

    <!-- Asset 2 -->
    <rect x="80" y="305" width="440" height="135" fill="url(#assetCard)" rx="4" stroke="#4E6042" stroke-width="1" filter="url(#cardWarp)" opacity="0.92"/>
    <rect x="80" y="305" width="440" height="135" filter="url(#crackle4)" fill="transparent"/>
    <circle cx="100" cy="328" r="11" fill="url(#assetHdr)" opacity="0.80"/>
    <text x="100" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#D8C890">2</text>
    <text x="118" y="332" font-size="14.5" font-weight="bold" fill="#1E3018">Generation-Then-Comprehension</text>
    <text x="100" y="357" font-size="12" fill="#2A2010">Accept a draft, then interrogate it:</text>
    <text x="100" y="374" font-size="12" fill="#2A2010">"explain this line by line," "what could</text>
    <text x="100" y="391" font-size="12" fill="#2A2010">go wrong here."</text>
    <text x="100" y="417" font-size="12" fill="#2A2010">The output becomes a lesson, not an escape.</text>

    <!-- Asset 3 -->
    <rect x="80" y="455" width="440" height="135" fill="url(#assetCard)" rx="4" stroke="#4E6042" stroke-width="1" filter="url(#cardWarp)" opacity="0.92"/>
    <rect x="80" y="455" width="440" height="135" filter="url(#crackle4)" fill="transparent"/>
    <circle cx="100" cy="478" r="11" fill="url(#assetHdr)" opacity="0.80"/>
    <text x="100" y="482" text-anchor="middle" font-size="12" font-weight="bold" fill="#D8C890">3</text>
    <text x="118" y="482" font-size="14.5" font-weight="bold" fill="#1E3018">Deliberate Struggle First</text>
    <text x="100" y="507" font-size="12" fill="#2A2010">Attempt the problem unaided, then</text>
    <text x="100" y="524" font-size="12" fill="#2A2010">compare against AI's approach.</text>
    <text x="100" y="550" font-size="12" fill="#2A2010">The gap between your attempt and the</text>
    <text x="100" y="567" font-size="12" fill="#2A2010">answer is where the learning lives.</text>
  </g>

  <!-- DEBT CARDS -->
  <g font-family="Georgia,serif">
    <!-- Debt 1 -->
    <rect x="680" y="155" width="440" height="135" fill="url(#debtCard)" rx="4" stroke="#7A2418" stroke-width="1" filter="url(#cardWarp)" opacity="0.92"/>
    <rect x="680" y="155" width="440" height="135" filter="url(#crackle4)" fill="transparent"/>
    <circle cx="700" cy="178" r="11" fill="url(#debtHdr)" opacity="0.80"/>
    <text x="700" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#D8C890">4</text>
    <text x="718" y="182" font-size="14.5" font-weight="bold" fill="#3E0C08">Full Delegation</text>
    <text x="700" y="207" font-size="12" fill="#2A1608">"Just do it" — the task ships,</text>
    <text x="700" y="224" font-size="12" fill="#2A1608">nothing about the task is retained.</text>
    <text x="700" y="250" font-size="12" fill="#2A1608">Fastest in the moment, most costly</text>
    <text x="700" y="267" font-size="12" fill="#2A1608">the next time the problem reappears.</text>

    <!-- Debt 2 -->
    <rect x="680" y="305" width="440" height="135" fill="url(#debtCard)" rx="4" stroke="#7A2418" stroke-width="1" filter="url(#cardWarp)" opacity="0.92"/>
    <rect x="680" y="305" width="440" height="135" filter="url(#crackle4)" fill="transparent"/>
    <circle cx="700" cy="328" r="11" fill="url(#debtHdr)" opacity="0.80"/>
    <text x="700" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#D8C890">5</text>
    <text x="718" y="332" font-size="14.5" font-weight="bold" fill="#3E0C08">Unverified Acceptance</text>
    <text x="700" y="357" font-size="12" fill="#2A1608">The output looks plausible, so it ships</text>
    <text x="700" y="374" font-size="12" fill="#2A1608">without a check against real understanding.</text>
    <text x="700" y="400" font-size="12" fill="#2A1608">This is where confidence in the tool quietly</text>
    <text x="700" y="417" font-size="12" fill="#2A1608">replaces confidence in yourself.</text>

    <!-- Debt 3 -->
    <rect x="680" y="455" width="440" height="135" fill="url(#debtCard)" rx="4" stroke="#7A2418" stroke-width="1" filter="url(#cardWarp)" opacity="0.92"/>
    <rect x="680" y="455" width="440" height="135" filter="url(#crackle4)" fill="transparent"/>
    <circle cx="700" cy="478" r="11" fill="url(#debtHdr)" opacity="0.80"/>
    <text x="700" y="482" text-anchor="middle" font-size="12" font-weight="bold" fill="#D8C890">6</text>
    <text x="718" y="482" font-size="14.5" font-weight="bold" fill="#3E0C08">Prompt-Only Iteration</text>
    <text x="700" y="507" font-size="12" fill="#2A1608">Rephrasing the request over and over</text>
    <text x="700" y="524" font-size="12" fill="#2A1608">rather than reasoning about the problem.</text>
    <text x="700" y="550" font-size="12" fill="#2A1608">Effort is spent on wording, not on the</text>
    <text x="700" y="567" font-size="12" fill="#2A1608">thinking the wording was meant to trigger.</text>
  </g>

  <text x="600" y="650" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="12" font-style="italic" fill="#2A1608" opacity="0.68">After Shen &amp; Tamkin (2026), "How AI Impacts Skill Formation" — six interaction patterns</text>
  <text x="600" y="668" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="12" font-style="italic" fill="#2A1608" opacity="0.68">observed in a randomized study of engineers learning a new library</text>
</svg>
