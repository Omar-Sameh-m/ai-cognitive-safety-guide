<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="canvas2" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="5" seed="9" result="linen"/>
      <feColorMatrix in="linen" type="matrix" values="0 0 0 0 0.13  0 0 0 0 0.09  0 0 0 0 0.06  0 0 0 0.26 0" result="t"/>
      <feComposite in="t" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="crackle2">
      <feTurbulence type="fractalNoise" baseFrequency="0.7 0.5" numOctaves="4" seed="13" result="c"/>
      <feColorMatrix in="c" type="matrix" values="0 0 0 0 0.07  0 0 0 0 0.04  0 0 0 0 0.02  0 0 0 0.10 0" result="ct"/>
      <feComposite in="ct" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="warp2">
      <feTurbulence type="turbulence" baseFrequency="0.025 0.04" numOctaves="3" seed="5" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="nodePaint">
      <feTurbulence type="turbulence" baseFrequency="0.04 0.06" numOctaves="3" seed="3" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="vigAged2" cx="50%" cy="48%" r="70%">
      <stop offset="45%" stop-color="#2C1A0A" stop-opacity="0"/>
      <stop offset="88%" stop-color="#1A0D04" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#0D0602" stop-opacity="0.62"/>
    </radialGradient>
    <linearGradient id="ground2" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#E6D4A4"/>
      <stop offset="40%"  stop-color="#D4BE86"/>
      <stop offset="100%" stop-color="#B89256"/>
    </linearGradient>
    <!-- disputed = muted sage green -->
    <linearGradient id="verdictDisp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C6B50"/><stop offset="100%" stop-color="#3E4D36"/>
    </linearGradient>
    <!-- confirmed = iron oxide red -->
    <linearGradient id="verdictLoss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A2418"/><stop offset="100%" stop-color="#541409"/>
    </linearGradient>
  </defs>

  <!-- ground -->
  <rect width="1200" height="500" fill="url(#ground2)"/>
  <rect width="1200" height="500" fill="url(#ground2)" filter="url(#canvas2)" opacity="0.88"/>
  <rect width="1200" height="500" filter="url(#crackle2)" fill="transparent"/>
  <rect width="1200" height="500" fill="url(#vigAged2)"/>

  <!-- frame -->
  <rect x="20" y="20" width="1160" height="460" fill="none" stroke="#6B3A1A" stroke-width="2" rx="1" filter="url(#warp2)" opacity="0.75"/>

  <!-- title -->
  <text x="600" y="62" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="#2A1608">
    Prior Debts on the Books
  </text>
  <text x="600" y="88" text-anchor="middle" font-family="Palatino,Georgia,serif" font-style="italic" font-size="14" fill="#3E2810" opacity="0.8">
    Three tools humanity already lent its mind to — and what came due
  </text>

  <!-- timeline spine — rough brushstroke line -->
  <line x1="110" y1="240" x2="1090" y2="240" stroke="#4A2810" stroke-width="3" stroke-linecap="round" opacity="0.55" filter="url(#warp2)"/>
  <polygon points="1090,234 1112,240 1090,246" fill="#4A2810" opacity="0.5" filter="url(#warp2)"/>

  <!-- CALCULATOR node -->
  <g transform="translate(280,240)" filter="url(#nodePaint)">
    <circle r="13" fill="#8B6C30" stroke="#2A1608" stroke-width="1.8" opacity="0.9"/>
    <circle r="7" fill="#D4A860" opacity="0.5"/>
  </g>
  <g transform="translate(280,240)" font-family="Georgia,serif">
    <text y="-78" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E1008">The Calculator</text>
    <text y="-55" text-anchor="middle" font-size="12" fill="#3E2810" font-style="italic" opacity="0.85">Classrooms, 1970s —</text>
    <rect x="-115" y="28" width="230" height="84" fill="url(#verdictDisp)" opacity="0.82" rx="3" filter="url(#nodePaint)"/>
    <rect x="-115" y="28" width="230" height="84" filter="url(#crackle2)" fill="transparent"/>
    <text y="53" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#D4C8A0" letter-spacing="1">DISPUTED</text>
    <text y="72" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#C8BA8C">Large reviews found little</text>
    <text y="87" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#C8BA8C">measurable loss in arithmetic</text>
  </g>

  <!-- GPS node -->
  <g transform="translate(600,240)" filter="url(#nodePaint)">
    <circle r="13" fill="#7A2418" stroke="#2A1608" stroke-width="1.8" opacity="0.9"/>
    <circle r="7" fill="#C07060" opacity="0.4"/>
  </g>
  <g transform="translate(600,240)" font-family="Georgia,serif">
    <text y="-78" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E1008">GPS Navigation</text>
    <text y="-55" text-anchor="middle" font-size="12" fill="#3E2810" font-style="italic" opacity="0.85">Widespread, 2000s —</text>
    <rect x="-125" y="28" width="250" height="84" fill="url(#verdictLoss)" opacity="0.85" rx="3" filter="url(#nodePaint)"/>
    <rect x="-125" y="28" width="250" height="84" filter="url(#crackle2)" fill="transparent"/>
    <text y="53" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#D4C8A0" letter-spacing="1">CONFIRMED LOSS</text>
    <text y="72" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#C8BA8C">Heavier lifetime use predicted</text>
    <text y="87" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#C8BA8C">measurably worse unaided navigation</text>
  </g>

  <!-- SEARCH node -->
  <g transform="translate(920,240)" filter="url(#nodePaint)">
    <circle r="13" fill="#7A2418" stroke="#2A1608" stroke-width="1.8" opacity="0.9"/>
    <circle r="7" fill="#C07060" opacity="0.4"/>
  </g>
  <g transform="translate(920,240)" font-family="Georgia,serif">
    <text y="-78" text-anchor="middle" font-size="18" font-weight="bold" fill="#1E1008">Search Engines</text>
    <text y="-55" text-anchor="middle" font-size="12" fill="#3E2810" font-style="italic" opacity="0.85">"The Google Effect," 2011 —</text>
    <rect x="-125" y="28" width="250" height="84" fill="url(#verdictLoss)" opacity="0.85" rx="3" filter="url(#nodePaint)"/>
    <rect x="-125" y="28" width="250" height="84" filter="url(#crackle2)" fill="transparent"/>
    <text y="53" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#D4C8A0" letter-spacing="1">CONFIRMED SHIFT</text>
    <text y="72" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#C8BA8C">People recall where to find facts</text>
    <text y="87" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#C8BA8C">rather than the facts themselves</text>
  </g>

  <!-- lesson box -->
  <rect x="200" y="398" width="800" height="64" fill="#3E2810" opacity="0.14" rx="3" filter="url(#nodePaint)"/>
  <text x="600" y="424" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="13.5" fill="#2A1608" opacity="0.82">
    The lesson isn't "tools are dangerous." It's that the outcome depends on what the tool replaces —
  </text>
  <text x="600" y="446" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="13.5" fill="#2A1608" font-weight="bold" opacity="0.85">
    a finished answer, or the struggle of finding one.
  </text>
</svg>
