<svg viewBox="0 0 1200 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="canvasG" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="5" seed="33" result="l"/>
      <feColorMatrix in="l" type="matrix" values="0 0 0 0 0.13  0 0 0 0 0.09  0 0 0 0 0.06  0 0 0 0.27 0" result="t"/>
      <feComposite in="t" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="crackleG">
      <feTurbulence type="fractalNoise" baseFrequency="0.70 0.48" numOctaves="4" seed="41" result="c"/>
      <feColorMatrix in="c" type="matrix" values="0 0 0 0 0.07  0 0 0 0 0.04  0 0 0 0 0.02  0 0 0 0.10 0" result="ct"/>
      <feComposite in="ct" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="warpG">
      <feTurbulence type="turbulence" baseFrequency="0.022 0.036" numOctaves="3" seed="16" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="vigG" cx="50%" cy="48%" r="70%">
      <stop offset="45%" stop-color="#2C1A0A" stop-opacity="0"/>
      <stop offset="88%" stop-color="#1A0D04" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#0D0602" stop-opacity="0.62"/>
    </radialGradient>
    <linearGradient id="groundG" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#E8D9B0"/>
      <stop offset="40%"  stop-color="#D9C890"/>
      <stop offset="100%" stop-color="#B89A58"/>
    </linearGradient>
    <!-- goldilocks fill -->
    <linearGradient id="sweetFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E5030" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3E5030" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="580" fill="url(#groundG)"/>
  <rect width="1200" height="580" fill="url(#groundG)" filter="url(#canvasG)" opacity="0.9"/>
  <rect width="1200" height="580" filter="url(#crackleG)" fill="transparent"/>
  <rect width="1200" height="580" fill="url(#vigG)"/>
  <rect x="22" y="22" width="1156" height="536" fill="none" stroke="#6B3A1A" stroke-width="2.5" rx="1" filter="url(#warpG)" opacity="0.8"/>

  <!-- title -->
  <text x="600" y="68" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="26" font-weight="bold" fill="#1E1008">How Much AI Help Is Too Much?</text>
  <text x="600" y="94" text-anchor="middle" font-family="Palatino,'Book Antiqua',Georgia,serif" font-style="italic" font-size="14.5" fill="#3E2810" opacity="0.82">Measured benefit of AI assistance varies by skill level</text>

  <!-- Y axis label -->
  <text x="95" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="12.5" fill="#3E2810" opacity="0.75" transform="rotate(-90,95,310)">measured benefit of AI assistance</text>

  <!-- Y axis -->
  <line x1="170" y1="130" x2="170" y2="450" stroke="#2A1608" stroke-width="1.2" opacity="0.45" filter="url(#warpG)"/>
  <!-- X axis -->
  <line x1="170" y1="450" x2="1060" y2="450" stroke="#2A1608" stroke-width="1.2" opacity="0.45" filter="url(#warpG)"/>
  <polygon points="1060,445 1075,450 1060,455" fill="#2A1608" opacity="0.45"/>

  <!-- axis labels -->
  <text x="190" y="470" font-family="Georgia,serif" font-size="12" fill="#3E2810" opacity="0.72">less skilled ↑ newer</text>
  <text x="940" y="470" font-family="Georgia,serif" font-size="12" fill="#3E2810" opacity="0.72">more skilled ↑ experienced</text>

  <!-- sweet spot shaded region -->
  <path d="M410,450 C410,450 450,145 640,135 C720,131 740,145 760,200 L760,450 Z"
        fill="url(#sweetFill)" opacity="0.9"/>

  <!-- THE CURVE: Venetian red, bell-like — peaks in middle of skill range -->
  <!-- low skill: high up (overload → low benefit) — then drops even lower as total novice -->
  <!-- middle: rises to peak -->
  <!-- high skill: resistance, lower -->
  <path d="M200,370 C280,350 360,280 490,170 C580,130 660,130 740,175 C820,225 890,310 1020,370"
        fill="none" stroke="#7A2418" stroke-width="4" stroke-linecap="round" opacity="0.88" filter="url(#warpG)"/>
  <!-- highlight stroke -->
  <path d="M200,370 C280,350 360,280 490,170 C580,130 660,130 740,175 C820,225 890,310 1020,370"
        fill="none" stroke="#C07858" stroke-width="1.5" stroke-linecap="round" opacity="0.35" filter="url(#warpG)"/>

  <!-- peak annotation -->
  <circle cx="600" cy="133" r="6" fill="#7A2418" opacity="0.85"/>

  <!-- ZONE 1: overload -->
  <rect x="185" y="255" width="148" height="60" fill="#7A2418" opacity="0.12" rx="3" filter="url(#warpG)"/>
  <text x="259" y="276" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" font-weight="bold" fill="#7A2418" opacity="0.90">overload</text>
  <text x="259" y="294" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#3E2810" opacity="0.78">too much, too fast</text>
  <text x="259" y="309" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#3E2810" opacity="0.78">can't be absorbed</text>

  <!-- ZONE 2: sweet spot -->
  <rect x="455" y="108" width="185" height="56" fill="#3E5030" opacity="0.14" rx="3" filter="url(#warpG)"/>
  <text x="547" y="129" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#3E5030" opacity="0.92">sweet spot</text>
  <text x="547" y="147" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#3E2810" opacity="0.78">enough foundation to judge,</text>
  <text x="547" y="161" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#3E2810" opacity="0.78">humble enough to use it</text>

  <!-- ZONE 3: resistance -->
  <rect x="865" y="248" width="148" height="60" fill="#7A2418" opacity="0.12" rx="3" filter="url(#warpG)"/>
  <text x="939" y="270" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" font-weight="bold" fill="#7A2418" opacity="0.90">resistance</text>
  <text x="939" y="288" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#3E2810" opacity="0.78">correct skepticism, but</text>
  <text x="939" y="303" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#3E2810" opacity="0.78">forgone efficiency</text>

  <!-- skill level tick labels -->
  <text x="260" y="495" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#3E2810" opacity="0.78">Novice</text>
  <text x="490" y="495" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#3E2810" opacity="0.78">Competent</text>
  <text x="720" y="495" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#3E2810" opacity="0.78">Proficient</text>
  <text x="950" y="495" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#3E2810" opacity="0.78">Expert</text>

  <!-- tick marks -->
  <line x1="260" y1="446" x2="260" y2="454" stroke="#2A1608" stroke-width="1.2" opacity="0.45"/>
  <line x1="490" y1="446" x2="490" y2="454" stroke="#2A1608" stroke-width="1.2" opacity="0.45"/>
  <line x1="720" y1="446" x2="720" y2="454" stroke="#2A1608" stroke-width="1.2" opacity="0.45"/>
  <line x1="950" y1="446" x2="950" y2="454" stroke="#2A1608" stroke-width="1.2" opacity="0.45"/>

  <!-- source -->
  <text x="600" y="548" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" font-style="italic" fill="#2A1608" opacity="0.60">After Luo et al. (Goldilocks effect in AI-assisted sales coaching) and Dreyfus &amp; Dreyfus (1980)</text>
</svg>
