<svg viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="canvas3" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="5" seed="11" result="l"/>
      <feColorMatrix in="l" type="matrix" values="0 0 0 0 0.13  0 0 0 0 0.09  0 0 0 0 0.06  0 0 0 0.27 0" result="t"/>
      <feComposite in="t" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="crackle3">
      <feTurbulence type="fractalNoise" baseFrequency="0.72 0.48" numOctaves="4" seed="17" result="c"/>
      <feColorMatrix in="c" type="matrix" values="0 0 0 0 0.07  0 0 0 0 0.04  0 0 0 0 0.02  0 0 0 0.11 0" result="ct"/>
      <feComposite in="ct" in2="SourceGraphic" operator="over"/>
    </filter>
    <filter id="warp3">
      <feTurbulence type="turbulence" baseFrequency="0.022 0.038" numOctaves="3" seed="6" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="stepWarp">
      <feTurbulence type="turbulence" baseFrequency="0.03 0.05" numOctaves="3" seed="8" result="w"/>
      <feDisplacementMap in="SourceGraphic" in2="w" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="vigAged3" cx="50%" cy="48%" r="70%">
      <stop offset="45%" stop-color="#2C1A0A" stop-opacity="0"/>
      <stop offset="88%" stop-color="#1A0D04" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#0D0602" stop-opacity="0.60"/>
    </radialGradient>
    <linearGradient id="ground3" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#E6D4A4"/>
      <stop offset="40%"  stop-color="#D4BE86"/>
      <stop offset="100%" stop-color="#B89256"/>
    </linearGradient>
    <!-- stair fill: raw sienna -->
    <linearGradient id="stairOil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8A056"/>
      <stop offset="100%" stop-color="#9C7232"/>
    </linearGradient>
    <!-- curve: Venetian red -->
    <filter id="curveShadow3">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#3E1408" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="650" fill="url(#ground3)"/>
  <rect width="1200" height="650" fill="url(#ground3)" filter="url(#canvas3)" opacity="0.88"/>
  <rect width="1200" height="650" filter="url(#crackle3)" fill="transparent"/>
  <rect width="1200" height="650" fill="url(#vigAged3)"/>
  <rect x="20" y="20" width="1160" height="610" fill="none" stroke="#6B3A1A" stroke-width="2" rx="1" filter="url(#warp3)" opacity="0.75"/>

  <text x="600" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="24" font-weight="bold" fill="#1E1008">The Guild's Staircase and the Narrow Gate of Help</text>
  <text x="600" y="86" text-anchor="middle" font-family="Palatino,Georgia,serif" font-style="italic" font-size="13.5" fill="#3E2810" opacity="0.82">Five stages of mastery, and where AI assistance actually helps rather than hollows</text>

  <!-- Goldilocks highlight — aged verdigris wash -->
  <rect x="370" y="105" width="290" height="400" fill="#4E6040" opacity="0.09" rx="5" filter="url(#stepWarp)"/>

  <!-- staircase steps — raw sienna impasto -->
  <g filter="url(#stepWarp)">
    <rect x="120" y="470" width="160" height="35" fill="url(#stairOil)" stroke="#3E2010" stroke-width="1.2" rx="1" opacity="0.92"/>
    <rect x="280" y="435" width="160" height="70" fill="url(#stairOil)" stroke="#3E2010" stroke-width="1.2" rx="1" opacity="0.92"/>
    <rect x="440" y="390" width="160" height="115" fill="url(#stairOil)" stroke="#3E2010" stroke-width="1.2" rx="1" opacity="0.92"/>
    <rect x="600" y="340" width="160" height="165" fill="url(#stairOil)" stroke="#3E2010" stroke-width="1.2" rx="1" opacity="0.92"/>
    <rect x="760" y="285" width="160" height="220" fill="url(#stairOil)" stroke="#3E2010" stroke-width="1.2" rx="1" opacity="0.92"/>
    <!-- crackle on stairs -->
    <rect x="120" y="470" width="160" height="35" filter="url(#crackle3)" fill="transparent"/>
    <rect x="280" y="435" width="160" height="70" filter="url(#crackle3)" fill="transparent"/>
    <rect x="440" y="390" width="160" height="115" filter="url(#crackle3)" fill="transparent"/>
    <rect x="600" y="340" width="160" height="165" filter="url(#crackle3)" fill="transparent"/>
    <rect x="760" y="285" width="160" height="220" filter="url(#crackle3)" fill="transparent"/>
  </g>

  <!-- stage labels -->
  <g font-family="Georgia,serif" font-size="12" font-weight="bold" fill="#1E1008" text-anchor="middle" opacity="0.85">
    <text x="200" y="525">Novice</text><text x="360" y="525">Adv. Beginner</text>
    <text x="520" y="525">Competent</text><text x="680" y="525">Proficient</text><text x="840" y="525">Expert</text>
  </g>
  <g font-family="Georgia,serif" font-size="11" font-style="italic" text-anchor="middle" opacity="0.80">
    <text x="200" y="546" fill="#7A2418">the Apprentice</text>
    <text x="520" y="546" fill="#3E5030">the Journeyman</text>
    <text x="840" y="546" fill="#7A2418">the Master</text>
  </g>

  <!-- Goldilocks curve — Venetian red, warped brush -->
  <path d="M120,280 C250,160 370,120 520,110 C650,102 740,165 920,265"
        fill="none" stroke="#7A2418" stroke-width="3.5" stroke-linecap="round"
        opacity="0.85" filter="url(#curveShadow3)"/>
  <path d="M120,280 C250,160 370,120 520,110 C650,102 740,165 920,265"
        fill="none" stroke="#C07858" stroke-width="1.2" stroke-linecap="round"
        opacity="0.35" filter="url(#warp3)"/>

  <text x="520" y="95" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-weight="bold" fill="#7A2418" opacity="0.85">▲ measured benefit of AI assistance</text>

  <!-- zone labels on aged parchment pills -->
  <g font-family="Palatino,Georgia,serif" font-size="11" fill="#1E1008">
    <rect x="130" y="237" width="130" height="55" fill="#7A2418" opacity="0.14" rx="3" filter="url(#stepWarp)"/>
    <text x="195" y="256" text-anchor="middle" font-weight="bold" fill="#7A2418" font-family="Georgia,serif" font-size="12">overload</text>
    <text x="195" y="272" text-anchor="middle" opacity="0.78">too much, too fast —</text>
    <text x="195" y="286" text-anchor="middle" opacity="0.78">can't be absorbed</text>

    <rect x="435" y="126" width="170" height="50" fill="#3E5030" opacity="0.13" rx="3" filter="url(#stepWarp)"/>
    <text x="520" y="143" text-anchor="middle" font-weight="bold" fill="#3E5030" font-family="Georgia,serif" font-size="13">the Goldilocks zone</text>
    <text x="520" y="160" text-anchor="middle" opacity="0.78">enough foundation to judge,</text>
    <text x="520" y="174" text-anchor="middle" opacity="0.78">humble enough to use it</text>

    <rect x="730" y="232" width="130" height="55" fill="#7A2418" opacity="0.14" rx="3" filter="url(#stepWarp)"/>
    <text x="795" y="251" text-anchor="middle" font-weight="bold" fill="#7A2418" font-family="Georgia,serif" font-size="12">resistance</text>
    <text x="795" y="267" text-anchor="middle" opacity="0.78">correct skepticism, but</text>
    <text x="795" y="281" text-anchor="middle" opacity="0.78">forgone efficiency</text>
  </g>

  <!-- axis -->
  <line x1="90" y1="570" x2="940" y2="570" stroke="#2A1608" stroke-width="1.2" opacity="0.55" filter="url(#warp3)"/>
  <polygon points="940,566 953,570 940,574" fill="#2A1608" opacity="0.45"/>
  <text x="90" y="590" font-family="Georgia,serif" font-size="11" fill="#3E2810" opacity="0.72">less skilled</text>
  <text x="870" y="590" font-family="Georgia,serif" font-size="11" fill="#3E2810" opacity="0.72">more skilled</text>

  <text x="600" y="630" text-anchor="middle" font-family="Palatino,Georgia,serif" font-size="11.5" fill="#2A1608" font-style="italic" opacity="0.68">After Dreyfus &amp; Dreyfus (1980) and the sales-coaching "Goldilocks effect" (Luo et al.)</text>
</svg>
